const{useState}=React;

const ACCESS_STORAGE_KEY="mindfulwill_access_unlocked";
const DEV_ACCESS_CODE="PREVIEW";

async function verifyAccessCode(code){
  const clean=code.trim();
  if(!clean)return{ok:false,message:"Enter the access code from your purchase email."};
  if(clean.toUpperCase()===DEV_ACCESS_CODE)return{ok:true};
  try{
    const res=await fetch("/.netlify/functions/verify-license",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({licenseKey:clean})
    });
    const data=await res.json().catch(()=>({}));
    if(res.ok&&data.valid)return{ok:true};
    return{ok:false,message:data.message||"That code could not be verified. Check the code and try again."};
  }catch(err){
    return{ok:false,message:"Could not reach the license server. Check your connection and try again."};
  }
}

/* ═══════════════ INGREDIENT HELPERS ═══════════════ */
function parseIng(str){
  const m=str.match(/^([\d./]+)\s*(oz|g|cup|cups|tbsp|tsp|lb|lbs|scoop|scoops|slice|slices|large|medium|small|clove|cloves|dash|pinch|)\s*(.*)/i);
  if(!m)return{qty:0,unit:"",name:str};
  let qty=m[1].includes('/')?m[1].split('/').reduce((a,b)=>+a/+b):+m[1];
  return{qty,unit:m[2].toLowerCase(),name:m[3].trim()||m[2]};
}
function roundQty(n,isInt,unit){
  if(isInt)return Math.max(1,Math.round(n));
  if(unit==="g")return n>=50?Math.round(n/5)*5:Math.round(n);
  return n;
}
function fmtQty(n,isInt,unit){
  n=roundQty(n,isInt,unit);
  if(isInt||unit==="g")return Math.round(n)+"";
  if(n>=1){n=Math.round(n*4)/4;const r=n%1;if(Math.abs(r)<.05)return Math.round(n)+"";if(Math.abs(r-.25)<.05)return(Math.floor(n)>0?Math.floor(n)+" ":"")+"1/4";if(Math.abs(r-.5)<.05)return(Math.floor(n)>0?Math.floor(n)+" ":"")+"1/2";if(Math.abs(r-.75)<.05)return(Math.floor(n)>0?Math.floor(n)+" ":"")+"3/4";return n.toFixed(1);}
  return(Math.round(n*10)/10)+"";
}
function scaleIng(ingredients,intFlags,scale){
  if(Math.abs(scale-1)<.04)return ingredients.map(i=>i);
  return ingredients.map((ing,idx)=>{const p=parseIng(ing);if(!p.qty)return ing;let nq=p.qty*scale;return fmtQty(nq,intFlags[idx],p.unit)+(p.unit?" "+p.unit:"")+" "+p.name;});
}

const ACTIVITY=[{l:"Sedentary",d:"Desk job, minimal exercise",f:1.2},{l:"Lightly Active",d:"1-3 days/week",f:1.375},{l:"Moderately Active",d:"3-5 days/week",f:1.55},{l:"Very Active",d:"6-7 days/week",f:1.725},{l:"Extremely Active",d:"2x daily or physical job",f:1.9}];
const GOALS=[{l:"Fat Loss",icon:"◇",adj:-.12,d:"~12% caloric deficit"},{l:"Maintain",icon:"○",adj:0,d:"Maintenance calories"},{l:"Build Muscle",icon:"△",adj:.08,d:"~8% caloric surplus"}];
const DIET_OPTS=["No restrictions","Vegetarian","Vegan","Gluten-free","Dairy-free","Keto","Pescatarian"];
const CAL_DISTS=[{l:"Even Split",k:"even",d:"Calories spread equally across all meals."},{l:"Bigger Before Noon",k:"front",d:"Heavier breakfast and morning meals, lighter later."},{l:"Bigger Afternoon",k:"back",d:"Lighter morning, heavier lunch and dinner."}];
const VAR_LVLS=[{l:"Consistent",k:"consistent",d:"Same meals each day. Minimal groceries."},{l:"Moderate",k:"moderate",d:"Some repeats with variety across the week."},{l:"High Variety",k:"varied",d:"Different meals each day. More ingredients."}];

/* ═══════════════ CALC ═══════════════ */
function calcTDEE(age,sex,h,w,af){return Math.round((sex==="male"?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161)*af);}
function calcMacros(w,tc){const p=Math.round(w*2.2),fc=Math.round(tc*.25),f=Math.round(fc/9),c=Math.round((tc-p*4-fc)/4);return{protein:p,fat:f,carbs:c};}
function toKg(v,u){return u==="kg"?+v:Math.round(+v*.453592*10)/10;}
function toCm(ft,i,cm,u){return u==="metric"?+cm:Math.round((+ft*12+ +(i||0))*2.54);}

// 3=B/L/D, 4=B/L/D/Snack, 5+=Meal 1..N
function getMealLabels(n){
  if(n===3)return["Breakfast","Lunch","Dinner"];
  if(n===4)return["Breakfast","Lunch","Dinner","Snack"];
  return Array.from({length:n},(_,i)=>"Meal "+(i+1));
}
// Internal types for DB matching when using Meal 1..N
function getSlotType(label,idx,total){
  if(label.startsWith("Meal")){
    if(idx===0)return"Breakfast";
    if(idx===total-1)return"Dinner";
    if(total>=5&&(idx===1||idx===3))return"Snack";
    return"Lunch";
  }
  return label;
}

function getDist(labels,d){const n=labels.length;if(d==="even")return labels.map(()=>1/n);const am=(l,i)=>l==="Breakfast"||l==="Mid-Morning Snack"||(l.startsWith("Meal")&&i<Math.ceil(n/2));const ac=labels.filter((l,i)=>am(l,i)).length||1,pc=labels.filter((l,i)=>!am(l,i)).length||1;return d==="front"?labels.map((l,i)=>am(l,i)?.6/ac:.4/pc):labels.map((l,i)=>am(l,i)?.3/ac:.7/pc);}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function filterPool(diet){return diet.includes("No restrictions")?DB:DB.filter(m=>diet.every(d=>m.tags.includes(d.toLowerCase())));}

function scaledMeal(m,scale){const s=Math.max(m.minS,Math.min(m.maxS,scale));return{name:m.name,type:"",ingredients:scaleIng(m.ingredients,m.intFlags,s),calories:Math.round(m.cal*s),protein:Math.round(m.p*s),fat:Math.round(m.f*s),carbs:Math.round(m.c*s),_id:m.id,_scale:s,_ref:m};}

function pickMeal(pool,tCal,type,usedDay,usedAll,vr){
  let c=pool.filter(m=>m.types.includes(type)&&!usedDay.has(m.id));
  if(!c.length)c=pool.filter(m=>m.cat===(type.includes("Snack")||type==="Snack"?"snack":"lunch")&&!usedDay.has(m.id));
  if(!c.length)c=pool.filter(m=>!usedDay.has(m.id));
  if(!c.length)c=pool;c=shuffle(c);
  let best=null,bs=Infinity;
  for(const m of c){const id=tCal/m.cal;if(id<m.minS||id>m.maxS)continue;let sc=Math.abs(m.cal*id-tCal);if(vr==="varied"&&usedAll.has(m.id))sc+=300;if(vr==="moderate"&&usedAll.has(m.id))sc+=80;if(sc<bs){bs=sc;best=m;}}
  if(!best)for(const m of c){const s=Math.max(m.minS,Math.min(m.maxS,tCal/m.cal));const sc=Math.abs(m.cal*s-tCal);if(sc<bs){bs=sc;best=m;}}
  return best||c[0]||pool[0];
}

function buildDay(pool,tCal,macros,labels,dist,vr,usedAll){
  const d=getDist(labels,dist),usedDay=new Set();
  const picks=labels.map((lb,i)=>{
    const sc=Math.round(tCal*d[i]);
    const slotType=getSlotType(lb,i,labels.length);
    const m=pickMeal(pool,sc,slotType,usedDay,usedAll,vr);
    usedDay.add(m.id);usedAll.add(m.id);
    return{meal:m,scale:Math.max(m.minS,Math.min(m.maxS,sc/m.cal)),label:lb};
  });
  let tot=picks.reduce((s,p)=>s+Math.round(p.meal.cal*p.scale),0);const gap=tCal-tot;
  if(Math.abs(gap)>15){let bf=null,br=0;for(const p of picks){const r=gap>0?(p.meal.maxS-p.scale)*p.meal.cal:(p.scale-p.meal.minS)*p.meal.cal;if(r>br){br=r;bf=p;}}if(bf)bf.scale=Math.max(bf.meal.minS,Math.min(bf.meal.maxS,bf.scale+gap/bf.meal.cal));}
  const meals=picks.map(p=>{const sm=scaledMeal(p.meal,p.scale);sm.type=p.label;return sm;});
  const totals=meals.reduce((t,m)=>({calories:t.calories+m.calories,protein:t.protein+m.protein,fat:t.fat+m.fat,carbs:t.carbs+m.carbs}),{calories:0,protein:0,fat:0,carbs:0});
  return{meals,totals};
}

function genPlan(tCal,macros,labels,cd,vr,diet){
  const pool=filterPool(diet);if(!pool.length)return null;
  const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],ua=new Set();
  if(vr==="consistent"){const{meals,totals}=buildDay(pool,tCal,macros,labels,cd,"consistent",ua);return days.map(d=>({day:d,meals:meals.map(m=>({...m})),totals:{...totals}}));}
  return days.map(d=>{const{meals,totals}=buildDay(pool,tCal,macros,labels,cd,vr,ua);return{day:d,meals,totals};});
}

function swapMealInPlan(plan,di,mi,pool,tCal,labels){
  const day=plan[di],meal=day.meals[mi];
  const usedDay=new Set(day.meals.map(m=>m._id).filter((_,i)=>i!==mi));
  const slotType=getSlotType(meal.type,mi,labels.length);
  let opts=pool.filter(m=>m.types.includes(slotType)&&m.id!==meal._id&&!usedDay.has(m.id));
  if(!opts.length)opts=pool.filter(m=>m.cat===(slotType.includes("Snack")?"snack":"lunch")&&m.id!==meal._id);
  if(!opts.length)return plan;
  const pick=opts[Math.floor(Math.random()*Math.min(3,opts.length))];
  const sm=scaledMeal(pick,meal.calories/pick.cal);sm.type=meal.type;
  const nm=[...day.meals];nm[mi]=sm;
  let tot=nm.reduce((s,m)=>s+m.calories,0);const gap=tCal-tot;
  if(Math.abs(gap)>15){const adj=sm._scale+gap/pick.cal;const ns=Math.max(pick.minS,Math.min(pick.maxS,adj));const c=scaledMeal(pick,ns);c.type=meal.type;nm[mi]=c;}
  const totals=nm.reduce((t,m)=>({calories:t.calories+m.calories,protein:t.protein+m.protein,fat:t.fat+m.fat,carbs:t.carbs+m.carbs}),{calories:0,protein:0,fat:0,carbs:0});
  const np=[...plan];np[di]={...day,meals:nm,totals};return np;
}

function makeGrocery(plan){
  const agg={};
  plan.forEach(d=>d.meals.forEach(m=>m.ingredients.forEach(ing=>{const p=parseIng(ing);const key=(p.unit?p.unit+" ":"")+(p.name||ing).toLowerCase();if(!agg[key])agg[key]={qty:0,unit:p.unit,name:p.name||ing};agg[key].qty+=p.qty;})));
  const cats={"Protein":[],"Grains & Carbs":[],"Fruits & Vegetables":[],"Dairy":[],"Fats & Oils":[],"Pantry":[],"Other":[]};
  const pw=["chicken","turkey","beef","salmon","tuna","shrimp","cod","tilapia","pork","egg","tofu","jerky","whey","casein","protein bar","protein","deli","sausage","meatball","bacon"];
  const gw=["rice","oat","pasta","bread","tortilla","quinoa","couscous","crackers","rice cake","pita","granola","lentil","bean","chickpea","black bean","corn tortilla"];
  const fv=["banana","berry","berries","blueberry","blueberries","strawberry","strawberries","apple","pineapple","tomato","tomatoes","broccoli","asparagus","spinach","pepper","peppers","zucchini","carrot","carrots","celery","lettuce","onion","onions","potato","potatoes","sweet potato","green bean","green beans","snap pea","snap peas","brussels","sprouts","edamame","avocado","cranberry","cranberries","fruit","cabbage","corn","cucumber","coleslaw","mixed berries","frozen berries","mixed vegetables","roasted corn","stir-fry vegetables"];
  const dw=["yogurt","cheese","cottage","milk","butter","parmesan","feta","string cheese"];
  const fw=["olive oil","coconut oil","sesame oil","peanut butter","almond butter","tahini","almonds","walnuts","nuts","chocolate chip","chocolate chips","hummus","mayo"];
  const py=["salt","pepper","garlic","cinnamon","cumin","thyme","rosemary","dill","basil","cilantro","ginger","italian","turmeric","lemon","lime","honey","soy sauce","salsa","mustard","marinara","cooking spray","dressing","water","sea salt","dash","pinch","bbq","red pepper","juice"];
  Object.values(agg).forEach(({qty,unit,name})=>{
    const k=name.toLowerCase();let display;
    if(qty>0){
      if(unit==="g"){const q=qty>=50?Math.round(qty/5)*5:Math.round(qty);display=q>=1000?`${(q/1000).toFixed(1)} kg ${name}`:`${q} g ${name}`;}
      else if(unit)display=`${fmtQty(qty,false,unit)} ${unit} ${name}`;
      else display=`${fmtQty(qty,false,"")} ${name}`;
    }else display=name;
    if(pw.some(w=>k.includes(w)))cats["Protein"].push(display);
    else if(fv.some(w=>k.includes(w)))cats["Fruits & Vegetables"].push(display);
    else if(gw.some(w=>k.includes(w)))cats["Grains & Carbs"].push(display);
    else if(dw.some(w=>k.includes(w)))cats["Dairy"].push(display);
    else if(fw.some(w=>k.includes(w)))cats["Fats & Oils"].push(display);
    else if(py.some(w=>k.includes(w)))cats["Pantry"].push(display);
    else cats["Other"].push(display);
  });
  return cats;
}

    doc.rect(0,0,W,H,"F");
    line(M,55,W-M,55,green,0.8);
    line(M,57,W-M,57,green,0.3);

    doc.setFont("helvetica","bold");doc.setFontSize(36);doc.setTextColor(...dark);
    doc.text("mindful",W/2-2,80,{align:"right"});
    doc.setTextColor(...green);
    doc.text("will",W/2+2,80,{align:"left"});

    doc.setFont("courier","normal");doc.setFontSize(8);doc.setTextColor(...mid);
    doc.text("CUSTOM MEAL PLAN",W/2,90,{align:"center"});

    line(W/2-20,97,W/2+20,97,green,0.3);

    doc.setFont("helvetica","bold");doc.setFontSize(12);doc.setTextColor(...dark);
    doc.text("Your Plan Summary",W/2,112,{align:"center"});

    const boxW=38,boxH=28,boxGap=6,totalBoxW=4*boxW+3*boxGap,boxStartX=(W-totalBoxW)/2;
    const boxes=[
      {label:"CALORIES",value:tCal+"",color:green},
      {label:"PROTEIN",value:macros.protein+"g",color:pColor},
      {label:"FAT",value:macros.fat+"g",color:fColor},
      {label:"CARBS",value:macros.carbs+"g",color:cColor}
    ];
    boxes.forEach((b,i)=>{
      const bx=boxStartX+i*(boxW+boxGap);
      doc.setFillColor(255,255,255);
      doc.roundedRect(bx,120,boxW,boxH,2,2,"F");
      doc.setDrawColor(...b.color);doc.setLineWidth(0.5);
      doc.roundedRect(bx,120,boxW,boxH,2,2,"S");
      doc.setFont("helvetica","bold");doc.setFontSize(16);doc.setTextColor(...b.color);
      doc.text(b.value,bx+boxW/2,134,{align:"center"});
      doc.setFont("courier","normal");doc.setFontSize(6);doc.setTextColor(...mid);
      doc.text(b.label,bx+boxW/2,142,{align:"center"});
    });

    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...mid);
    doc.text(`Goal: ${GOALS[goalI].l}  •  ${mc} meals/day  •  ${diet.join(", ")||"No restrictions"}`,W/2,160,{align:"center"});

    line(M,170,W-M,170,green,0.3);
    doc.setFont("courier","normal");doc.setFontSize(7);doc.setTextColor(...light);
    doc.text("Generated by MindfulWill Meal Planner",W/2,178,{align:"center"});
    doc.text("This plan is for informational purposes only. Consult a healthcare provider before making dietary changes.",W/2,184,{align:"center",maxWidth:CW});

    // --- DAILY MEAL PAGES ---
    plan.forEach((day,di)=>{
      addPage();
      doc.setFillColor(244,241,236);doc.rect(0,0,W,H,"F");

      doc.setFont("helvetica","bold");doc.setFontSize(18);doc.setTextColor(...dark);
      doc.text(day.day,M,y+6);
      doc.setFont("courier","normal");doc.setFontSize(8);doc.setTextColor(...mid);
      doc.text(`Day ${di+1} of 7`,W-M,y+6,{align:"right"});
      y+=10;
      line(M,y,W-M,y,green,0.5);y+=3;

      const sBoxW=CW/4,sBoxH=14;
      const stats=[
        {l:"CALORIES",v:day.totals.calories+"",c:green},
        {l:"PROTEIN",v:day.totals.protein+"g",c:pColor},
        {l:"FAT",v:day.totals.fat+"g",c:fColor},
        {l:"CARBS",v:day.totals.carbs+"g",c:cColor}
      ];
      stats.forEach((s,i)=>{
        const sx=M+i*sBoxW;
        doc.setFont("helvetica","bold");doc.setFontSize(13);doc.setTextColor(...s.c);
        doc.text(s.v,sx+sBoxW/2,y+6,{align:"center"});
        doc.setFont("courier","normal");doc.setFontSize(5.5);doc.setTextColor(...mid);
        doc.text(s.l,sx+sBoxW/2,y+11,{align:"center"});
      });
      y+=sBoxH+4;
      line(M,y,W-M,y,[212,207,199],0.2);y+=5;

      day.meals.forEach((meal,mi)=>{
        const ingCount=meal.ingredients.length;
        const estHeight=30+ingCount*4.5;
        checkSpace(estHeight);

        doc.setFont("courier","normal");doc.setFontSize(7);doc.setTextColor(...green);
        doc.text(meal.type.toUpperCase(),M,y);
        doc.setFont("helvetica","bold");doc.setFontSize(11);doc.setTextColor(...dark);
        doc.text(meal.name,M,y+5.5);

        doc.setFont("courier","bold");doc.setFontSize(8);doc.setTextColor(...green);
        doc.text(meal.calories+" kcal",W-M,y,{align:"right"});
        doc.setFont("courier","normal");doc.setFontSize(7);
        const macLine=`P: ${meal.protein}g  •  F: ${meal.fat}g  •  C: ${meal.carbs}g`;
        doc.setTextColor(...mid);
        doc.text(macLine,W-M,y+5.5,{align:"right"});
        y+=11;

        meal.ingredients.forEach(ing=>{
          checkSpace(5);
          doc.setFillColor(...green);doc.circle(M+2,y-0.8,0.6,"F");
          doc.setFont("helvetica","normal");doc.setFontSize(8.5);doc.setTextColor(...dark);
          doc.text(ing,M+6,y);
          y+=4.5;
        });
        y+=3;
        if(mi<day.meals.length-1){line(M,y,W-M,y,[232,228,220],0.2);y+=5;}
      });
    });

    // --- GROCERY LIST PAGE ---
    addPage();
    doc.setFillColor(244,241,236);doc.rect(0,0,W,H,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(18);doc.setTextColor(...dark);
    doc.text("Grocery List",M,y+6);y+=10;
    line(M,y,W-M,y,green,0.5);y+=6;

    if(grocery){
      const cats=Object.entries(grocery).filter(([,items])=>items.length>0);
      const colW=CW/2-3;
      let col=0,colY=y,colX=M;
      const startY=y;

      cats.forEach(([cat,items])=>{
        const need=8+items.length*4.5;
        if(colY+need>H-M&&col===0){col=1;colX=M+colW+6;colY=startY;}
        else if(colY+need>H-M&&col===1){addPage();doc.setFillColor(244,241,236);doc.rect(0,0,W,H,"F");col=0;colX=M;colY=M;}

        doc.setFont("courier","bold");doc.setFontSize(8);doc.setTextColor(...green);
        doc.text(cat.toUpperCase(),colX,colY);colY+=5;

        items.forEach(it=>{
          if(colY>H-M){
            if(col===0){col=1;colX=M+colW+6;colY=startY;}
            else{addPage();doc.setFillColor(244,241,236);doc.rect(0,0,W,H,"F");col=0;colX=M;colY=M;}
          }
          doc.setFillColor(...green);doc.rect(colX,colY-2.5,1.5,1.5,"F");
          doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(...dark);
          doc.text(it,colX+4,colY,{maxWidth:colW-6});
          colY+=4.5;
        });
        colY+=4;
      });
    }

    doc.save("mindfulwill-meal-plan.pdf");
  };

  const shell={minHeight:"100vh",background:C.bg,color:C.tx,fontFamily:F.b,padding:"20px 16px"};
  const cBox={maxWidth:540,margin:"0 auto",padding:"28px 24px",background:C.card,borderRadius:16,border:`1px solid ${C.bd}`,boxShadow:"0 2px 16px rgba(0,0,0,.04)"};
  const brand=<div style={{textAlign:"center",marginBottom:6}}><div style={{fontFamily:F.d,fontSize:32,fontWeight:700,color:C.tx,letterSpacing:-.5,lineHeight:1}}>mindful<span style={{color:C.ac}}>will</span></div><div style={{fontFamily:F.m,fontSize:9,color:C.tm,letterSpacing:2,textTransform:"uppercase",marginTop:6,fontWeight:600}}>meal planner</div></div>;
  const footer=<div style={{textAlign:"center",marginTop:24,fontFamily:F.m,fontSize:9,color:C.tm,letterSpacing:1}}>built with intention by mindfulwill</div>;

  if(phase==="results"&&plan){
    const day=plan[selDay];
    return<div style={shell}><div style={{maxWidth:620,margin:"0 auto"}}>{brand}
      <div style={{display:"flex",justifyContent:"center",gap:24,margin:"18px 0 14px",padding:"14px 0",borderTop:`1px solid ${C.bd}`,borderBottom:`1px solid ${C.bd}`}}><MBar label="Target Cal"value={tCal}color={C.ac}/><MBar label="Protein"value={macros.protein+"g"}color={C.pc}/><MBar label="Fat"value={macros.fat+"g"}color={C.fc}/><MBar label="Carbs"value={macros.carbs+"g"}color={C.cc}/></div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><Tog options={[{l:"Meals",v:"meals"},{l:"Grocery List",v:"grocery"}]}value={tab}onChange={setTab}/></div>
      {tab==="meals"?<React.Fragment>
        <div style={{display:"flex",gap:5,marginBottom:14,justifyContent:"center",flexWrap:"wrap"}}>{plan.map((d,i)=><div key={d.day}onClick={()=>setSelDay(i)}style={{padding:"7px 13px",borderRadius:8,cursor:"pointer",background:i===selDay?C.ac:C.card,color:i===selDay?"#fff":C.ts,border:`1.5px solid ${i===selDay?C.ac:C.bd}`,fontFamily:F.m,fontSize:11,fontWeight:600,transition:"all .2s"}}>{d.day.slice(0,3)}</div>)}</div>
        {day&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {day.meals.map((meal,mi)=><div key={mi+meal._id}style={{background:C.card,borderRadius:12,padding:"16px 18px",border:`1px solid ${C.bl}`,boxShadow:"0 1px 6px rgba(0,0,0,.03)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div><div style={{fontFamily:F.m,fontSize:9,color:C.tm,letterSpacing:1.2,textTransform:"uppercase",fontWeight:600}}>{meal.type}</div><div style={{fontFamily:F.b,fontSize:15,fontWeight:700,color:C.tx,marginTop:2}}>{meal.name}</div></div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontFamily:F.m,fontSize:12,fontWeight:600,color:C.ac,background:C.al,padding:"4px 10px",borderRadius:6}}>{meal.calories} kcal</span>
                <span onClick={()=>doSwap(selDay,mi)}style={{fontFamily:F.m,fontSize:10,color:C.ac,cursor:"pointer",padding:"4px 8px",borderRadius:6,border:`1px solid ${C.bd}`,fontWeight:600}}title="Swap meal">↻</span>
              </div>
            </div>
            <div style={{display:"flex",gap:14,marginBottom:10}}>{[{l:"P",v:meal.protein,c:C.pc},{l:"F",v:meal.fat,c:C.fc},{l:"C",v:meal.carbs,c:C.cc}].map(x=><span key={x.l}style={{fontFamily:F.m,fontSize:11,color:x.c,fontWeight:600}}>{x.v}g {x.l}</span>)}</div>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>{meal.ingredients.map((ing,j)=><div key={j}style={{fontFamily:F.b,fontSize:13,color:C.ts,lineHeight:1.5,paddingLeft:10,borderLeft:`2px solid ${C.bl}`}}>{ing}</div>)}</div>
          </div>)}
          <div style={{padding:"12px 18px",borderRadius:10,background:C.al,border:`1px solid ${C.ac}30`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><span style={{fontFamily:F.m,fontSize:11,fontWeight:700,color:C.ac}}>{day.day} Totals</span><div style={{display:"flex",gap:14}}>{[{l:"Cal",v:day.totals.calories},{l:"P",v:day.totals.protein+"g"},{l:"F",v:day.totals.fat+"g"},{l:"C",v:day.totals.carbs+"g"}].map(t=><span key={t.l}style={{fontFamily:F.m,fontSize:11,color:C.tx,fontWeight:600}}>{t.l}: {t.v}</span>)}</div></div>
        </div>}
      </React.Fragment>:
        <div style={{display:"flex",flexDirection:"column",gap:12}}>{grocery&&Object.entries(grocery).map(([cat,items])=>{if(!items.length)return null;return<div key={cat}style={{background:C.card,borderRadius:12,padding:"16px 18px",border:`1px solid ${C.bl}`,boxShadow:"0 1px 6px rgba(0,0,0,.03)"}}><div style={{fontFamily:F.m,fontSize:10,color:C.ac,letterSpacing:1.2,textTransform:"uppercase",marginBottom:10,fontWeight:700}}>{cat}</div>{items.map((it,i)=><div key={i}style={{fontFamily:F.b,fontSize:13,color:C.ts,padding:"6px 0",borderBottom:i<items.length-1?`1px solid ${C.bl}`:"none",lineHeight:1.4}}>{it}</div>)}</div>})}</div>
      }
      <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
        <Btn onClick={exportPDF}style={{fontSize:13,padding:"14px 36px",width:"100%",maxWidth:340}}>Download PDF</Btn>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <Btn onClick={exportTxt}v="secondary"style={{fontSize:11,padding:"10px 18px"}}>Export .txt</Btn>
          <Btn onClick={exportCSV}v="secondary"style={{fontSize:11,padding:"10px 18px"}}>Export .csv</Btn>
          <Btn onClick={generate}v="secondary"style={{fontSize:11,padding:"10px 18px"}}>Regenerate</Btn>
          <Btn onClick={()=>{setPhase("onboarding");setStep(0);setPlan(null);setGrocery(null);setSelDay(0);setTab("meals");}}v="secondary"style={{fontSize:11,padding:"10px 18px"}}>Start Over</Btn>
        </div>
      </div>{footer}
    </div></div>;
  }

  return<div style={shell}><div style={cBox}>{brand}<div style={{height:16}}/><Dots c={step}t={3}/>
    {step===0&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontFamily:F.d,fontSize:20,fontWeight:600,color:C.tx}}>About You</div><Tog options={[{l:"Imperial",v:"imperial"},{l:"Metric",v:"metric"}]}value={units}onChange={setUnits}/></div>
      <div style={{display:"flex",gap:12}}>
        <Inp label="Age"value={age}onChange={setAge}min={14}max={85}style={{flex:1}}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:11,fontFamily:F.m,color:C.tm,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>Sex</label><div style={{display:"flex",gap:6}}><Chip sel={sex==="male"}onClick={()=>setSex("male")}style={{flex:1,textAlign:"center"}}>Male</Chip><Chip sel={sex==="female"}onClick={()=>setSex("female")}style={{flex:1,textAlign:"center"}}>Female</Chip></div></div>
      </div>
      {units==="imperial"?<div style={{display:"flex",gap:12}}><Inp label="Height"value={hFt}onChange={setHFt}min={4}max={7}suffix="ft"style={{flex:1}}/><Inp label="&nbsp;"value={hIn}onChange={setHIn}min={0}max={11.9}step={0.5}suffix="in"style={{flex:1}}/></div>:<Inp label="Height"value={hCm}onChange={setHCm}min={120}max={220}suffix="cm"/>}
      <Inp label="Weight"value={wt}onChange={setWt}min={units==="imperial"?80:35}max={units==="imperial"?400:180}suffix={units==="imperial"?"lbs":"kg"}/>
      <div style={{padding:"14px 16px",borderRadius:10,background:"#faf8f4",border:`1px solid ${C.bl}`}}>
        <label style={{display:"flex",gap:10,cursor:"pointer",alignItems:"flex-start"}}>
          <input type="checkbox"checked={agreed}onChange={e=>setAgreed(e.target.checked)}style={{marginTop:3,width:16,height:16,accentColor:C.ac,cursor:"pointer",flexShrink:0}}/>
          <span style={{fontFamily:F.b,fontSize:12,color:C.ts,lineHeight:1.5}}>
            This tool provides general nutritional estimates and is not a substitute for professional medical advice. By continuing, you acknowledge that you are responsible for your own health decisions and should consult your doctor or a licensed healthcare provider before making dietary changes.
          </span>
        </label>
      </div>
    </div>}
    {step===1&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:F.d,fontSize:20,fontWeight:600,color:C.tx}}>Your Goals</div>
      <div><SLbl>Activity Level</SLbl><div style={{display:"flex",flexDirection:"column",gap:6}}>{ACTIVITY.map((a,i)=><OCard key={a.l}sel={actI===i}onClick={()=>setActI(i)}><span style={{fontFamily:F.b,fontWeight:700,fontSize:14,color:actI===i?C.ac:C.tx}}>{a.l}</span><span style={{fontFamily:F.b,fontSize:12,color:C.tm,marginLeft:8}}>{a.d}</span></OCard>)}</div></div>
      <div><SLbl>Goal</SLbl><div style={{display:"flex",gap:8}}>{GOALS.map((g,i)=><OCard key={g.l}sel={goalI===i}onClick={()=>setGoalI(i)}style={{flex:1,textAlign:"center",padding:"18px 10px"}}><div style={{fontFamily:F.d,fontSize:28,color:goalI===i?C.ac:C.tm,marginBottom:4}}>{g.icon}</div><div style={{fontFamily:F.b,fontWeight:700,fontSize:13,color:goalI===i?C.ac:C.tx}}>{g.l}</div><div style={{fontFamily:F.m,fontSize:9,color:C.tm,marginTop:3}}>{g.d}</div></OCard>)}</div></div>
    </div>}
    {step===2&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:F.d,fontSize:20,fontWeight:600,color:C.tx}}>Preferences</div>
      <div><SLbl>Dietary</SLbl><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{DIET_OPTS.map(o=><Chip key={o}sel={diet.includes(o)}onClick={()=>togDiet(o)}>{o}</Chip>)}</div></div>
      <div><SLbl>Meals per Day</SLbl><div style={{display:"flex",gap:6}}>{[3,4,5,6].map(n=><Chip key={n}sel={mc===n}onClick={()=>setMc(n)}style={{flex:1,textAlign:"center"}}>{n}</Chip>)}</div></div>
      <div><SLbl>Calorie Distribution</SLbl><div style={{display:"flex",flexDirection:"column",gap:6}}>{CAL_DISTS.map(x=><OCard key={x.k}sel={cd===x.k}onClick={()=>setCd(x.k)}><span style={{fontFamily:F.b,fontWeight:700,fontSize:13,color:cd===x.k?C.ac:C.tx}}>{x.l}</span><span style={{fontFamily:F.b,fontSize:12,color:C.tm,marginLeft:8}}>{x.d}</span></OCard>)}</div></div>
      <div><SLbl>Meal Variety</SLbl><div style={{display:"flex",flexDirection:"column",gap:6}}>{VAR_LVLS.map(x=><OCard key={x.k}sel={vr===x.k}onClick={()=>setVr(x.k)}><span style={{fontFamily:F.b,fontWeight:700,fontSize:13,color:vr===x.k?C.ac:C.tx}}>{x.l}</span><span style={{fontFamily:F.b,fontSize:12,color:C.tm,marginLeft:8}}>{x.d}</span></OCard>)}</div></div>
      {actI!==null&&goalI!==null&&<div style={{padding:"16px 18px",borderRadius:12,background:C.al,border:`1px solid ${C.ac}30`}}><div style={{fontFamily:F.m,fontSize:9,color:C.tm,letterSpacing:1.2,textTransform:"uppercase",marginBottom:10,fontWeight:600}}>Your Targets</div><div style={{display:"flex",justifyContent:"space-between"}}><MBar label="Calories"value={tCal}color={C.ac}/><MBar label="Protein"value={macros.protein+"g"}color={C.pc}/><MBar label="Fat"value={macros.fat+"g"}color={C.fc}/><MBar label="Carbs"value={macros.carbs+"g"}color={C.cc}/></div></div>}
    </div>}
    <div style={{display:"flex",justifyContent:step===0?"flex-end":"space-between",marginTop:22}}>
      {step>0&&<Btn v="secondary"onClick={()=>setStep(step-1)}>Back</Btn>}
      {step<2?<Btn onClick={()=>setStep(step+1)}dis={!canAdv()}>Continue</Btn>:<Btn onClick={generate}dis={!canAdv()}>Generate Plan</Btn>}
    </div>
  </div></div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
